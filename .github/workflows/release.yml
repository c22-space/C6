name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install trunk
        run: cargo install trunk --locked

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'C12 ${{ github.ref_name }}'
          releaseBody: |
            ## C12 ${{ github.ref_name }}

            Carbon accounting for GRI 305, ISO 14064 & UNGC.

            ### Install
            Download the installer for your platform below.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  # After all platform builds succeed, publish the draft release
  # and upload the update manifest to R2 for the in-app updater.
  publish:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Publish draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ github.ref_name }} --draft=false

      - name: Generate latest.json and upload to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_BUCKET: c12-updates
        run: |
          VERSION="${{ github.ref_name }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Fetch release asset URLs (sig files generated by tauri-action)
          ASSETS=$(gh release view "$VERSION" --json assets --jq '.assets')

          get_url() {
            echo "$ASSETS" | jq -r ".[] | select(.name | test(\"$1\")) | .browserDownloadUrl" | head -1
          }
          get_sig() {
            SIG_URL=$(get_url "$1")
            [ -n "$SIG_URL" ] && curl -fsSL "$SIG_URL" || echo ""
          }

          DMG_ARM_URL=$(get_url "aarch64.dmg$")
          DMG_ARM_SIG=$(get_sig "aarch64.dmg.sig$")
          DMG_X64_URL=$(get_url "x64.dmg$")
          DMG_X64_SIG=$(get_sig "x64.dmg.sig$")
          APPIMAGE_URL=$(get_url ".AppImage$")
          APPIMAGE_SIG=$(get_sig ".AppImage.sig$")
          MSI_URL=$(get_url ".msi$")
          MSI_SIG=$(get_sig ".msi.sig$")

          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "See https://github.com/${{ github.repository }}/releases/tag/$VERSION for details.",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": { "url": "$DMG_ARM_URL", "signature": "$DMG_ARM_SIG" },
              "darwin-x86_64":  { "url": "$DMG_X64_URL", "signature": "$DMG_X64_SIG" },
              "linux-x86_64":   { "url": "$APPIMAGE_URL", "signature": "$APPIMAGE_SIG" },
              "windows-x86_64": { "url": "$MSI_URL", "signature": "$MSI_SIG" }
            }
          }
          EOF

          # Upload to R2 via Cloudflare API
          curl -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/r2/buckets/${R2_BUCKET}/objects/latest.json" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @latest.json
