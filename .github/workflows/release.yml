name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }},wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: mkdir -p ui/dist

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'C6 ${{ github.ref_name }}'
          releaseBody: |
            ## C6 ${{ github.ref_name }}

            Carbon accounting for GRI 305, ISO 14064 & UNGC.

            ### Install
            Download the installer for your platform below.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  publish:
    needs: build
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Publish draft release
        run: gh release edit ${{ github.ref_name }} --draft=false

      - name: Upload latest.json to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_BUCKET: c12-updates
        run: |
          VERSION="${{ github.ref_name }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ASSETS=$(gh release view "$VERSION" --json assets --jq '.assets')

          get_url() { echo "$ASSETS" | jq -r ".[] | select(.name | test(\"$1\")) | .browserDownloadUrl" | head -1; }
          get_sig() { SIG_URL=$(get_url "$1"); [ -n "$SIG_URL" ] && curl -fsSL "$SIG_URL" || echo ""; }

          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "See https://github.com/${{ github.repository }}/releases/tag/$VERSION for details.",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": { "url": "$(get_url "aarch64.app.tar.gz$")", "signature": "$(get_sig "aarch64.app.tar.gz.sig$")" },
              "darwin-x86_64":  { "url": "$(get_url "x64.app.tar.gz$")", "signature": "$(get_sig "x64.app.tar.gz.sig$")" },
              "linux-x86_64":   { "url": "$(get_url ".AppImage$")", "signature": "$(get_sig ".AppImage.sig$")" },
              "windows-x86_64": { "url": "$(get_url ".msi.zip$")", "signature": "$(get_sig ".msi.zip.sig$")" }
            }
          }
          EOF

          curl -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/r2/buckets/${R2_BUCKET}/objects/latest.json" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @latest.json
