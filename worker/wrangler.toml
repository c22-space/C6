name = "c6-api"
main = "build/worker/shim.mjs"
compatibility_date = "2025-01-01"

# Deployed at: https://api.c6.c22.space
routes = [{ pattern = "api.c6.c22.space/*", zone_name = "c22.space" }]

[build]
command = "cargo install -q worker-build && worker-build --release"

[[d1_databases]]
binding = "DB"
database_name = "c6-enterprise"
database_id = "c086b0a3-6abb-4c61-9acc-5f7d3f165e46"

[[r2_buckets]]
binding = "UPDATES"
bucket_name = "c6-updates"

[vars]
DODO_WEBHOOK_SECRET = ""     # set via wrangler secret put DODO_WEBHOOK_SECRET
JWT_SECRET = ""              # set via wrangler secret put JWT_SECRET
